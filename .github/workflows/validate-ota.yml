name: Validate OTA Repository

on:
  push:
    branches:
      - gh-pages
      - main
      - master
  pull_request:

jobs:
  validate-source:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate source metadata
        shell: bash
        run: |
          set -euxo pipefail
          test -f CNAME
          domain="$(head -n 1 CNAME | tr -d '[:space:]')"
          test -n "${domain}"

  validate-published:
    runs-on: ubuntu-latest
    if: github.ref_name == 'gh-pages' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install validation tools
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y ostree

      - name: Validate published root metadata
        shell: bash
        run: |
          set -euxo pipefail
          test -f CNAME
          test -f chillboio.flatpakrepo
          grep -q "^Url=https://flatpak-ota.chillboiostudios.com/repo/$" chillboio.flatpakrepo
          grep -q "^DefaultBranch=stable$" chillboio.flatpakrepo
          grep -q "^SuggestRemoteName=chillboio$" chillboio.flatpakrepo

      - name: Validate merged repo for Discover
        shell: bash
        run: |
          set -euxo pipefail
          test -d repo

          # Bootstrap state (no published apps yet) is valid.
          if ostree --repo=repo refs | grep -q '^app/'; then
            test -f repo/summary
            ostree --repo=repo refs | grep -q '^appstream/'
          else
            echo "No published app refs yet; skipping strict Discover checks."
          fi

      - name: Validate published app metadata and refs
        shell: bash
        run: |
          set -euxo pipefail

          found_app=0
          while IFS= read -r app_dir; do
            if [ ! -d "${app_dir}/repo" ]; then
              continue
            fi

            found_app=1

            x86_ref="${app_dir}/com.chillboiostudios.dawnchat.flatpakref"
            arm_ref="${app_dir}/com.chillboiostudios.dawnchat.aarch64.flatpakref"

            if [ -f "${x86_ref}" ]; then
              grep -q "^Name=app/com.chillboiostudios.dawnchat/x86_64/stable$" "${x86_ref}"
              grep -q "^Url=https://flatpak-ota.chillboiostudios.com/" "${x86_ref}"
            fi

            if [ -f "${arm_ref}" ]; then
              grep -q "^Name=app/com.chillboiostudios.dawnchat/aarch64/stable$" "${arm_ref}"
              grep -q "^Url=https://flatpak-ota.chillboiostudios.com/" "${arm_ref}"
            fi
          done < <(find apps -mindepth 1 -maxdepth 1 -type d | sort)

          if [ "${found_app}" -eq 0 ]; then
            echo "No published app repos found under apps/; bootstrap state is valid."
          fi
