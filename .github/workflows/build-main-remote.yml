name: Build Main Flatpak Remote

on:
  push:
    branches:
      - main
      - master
      - gh-pages
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sanity-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sanity checks
        shell: bash
        run: |
          set -euxo pipefail

          test -f CNAME
          domain="$(head -n 1 CNAME | tr -d '[:space:]')"
          test -n "${domain}"

          while IFS= read -r app_dir; do
            # Empty/bootstrap app directories are allowed; validate only when repo exists.
            if [ ! -d "${app_dir}/repo" ]; then
              continue
            fi

            x86_ref="${app_dir}/com.chillboiostudios.dawnchat.flatpakref"
            arm_ref="${app_dir}/com.chillboiostudios.dawnchat.aarch64.flatpakref"

            if [ -f "${x86_ref}" ]; then
              grep -q "^Url=https://${domain}/" "${x86_ref}"
              grep -q "^Branch=stable$" "${x86_ref}"
            fi

            if [ -f "${arm_ref}" ]; then
              grep -q "^Url=https://${domain}/" "${arm_ref}"
              grep -q "^Branch=stable$" "${arm_ref}"
            fi
          done < <(find apps -mindepth 1 -maxdepth 1 -type d | sort)

  validate-published:
    runs-on: ubuntu-latest
    if: github.ref_name == 'gh-pages'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install validation tools
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y ostree

      - name: Validate published root metadata
        shell: bash
        run: |
          set -euxo pipefail
          test -f CNAME
          test -f chillboio.flatpakrepo
          grep -q "^Url=https://flatpak-ota.chillboiostudios.com/repo/$" chillboio.flatpakrepo
          grep -q "^DefaultBranch=stable$" chillboio.flatpakrepo
          grep -q "^SuggestRemoteName=chillboio$" chillboio.flatpakrepo

      - name: Validate merged repo for Discover
        shell: bash
        run: |
          set -euxo pipefail
          test -d repo

          # Bootstrap state (no published apps yet) is valid.
          if ostree --repo=repo refs | grep -q '^app/'; then
            test -f repo/summary
            ostree --repo=repo refs | grep -q '^appstream/'
          else
            echo "No published app refs yet; skipping strict Discover checks."
          fi

      - name: Validate published app metadata and refs
        shell: bash
        run: |
          set -euxo pipefail

          found_app=0
          while IFS= read -r app_dir; do
            if [ ! -d "${app_dir}/repo" ]; then
              continue
            fi

            found_app=1

            x86_ref="${app_dir}/com.chillboiostudios.dawnchat.flatpakref"
            arm_ref="${app_dir}/com.chillboiostudios.dawnchat.aarch64.flatpakref"

            if [ -f "${x86_ref}" ]; then
              grep -q "^Name=app/com.chillboiostudios.dawnchat/x86_64/stable$" "${x86_ref}"
              grep -q "^Url=https://flatpak-ota.chillboiostudios.com/" "${x86_ref}"
            fi

            if [ -f "${arm_ref}" ]; then
              grep -q "^Name=app/com.chillboiostudios.dawnchat/aarch64/stable$" "${arm_ref}"
              grep -q "^Url=https://flatpak-ota.chillboiostudios.com/" "${arm_ref}"
            fi
          done < <(find apps -mindepth 1 -maxdepth 1 -type d | sort)

          if [ "${found_app}" -eq 0 ]; then
            echo "No published app repos found under apps/; bootstrap state is valid."
          fi

  build-main-remote:
    needs:
      - sanity-check
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'main' || github.ref_name == 'master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v5

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y flatpak ostree rsync git

      - name: Prepare gh-pages workspace
        shell: bash
        run: |
          set -euxo pipefail

          git clone --depth=1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" .gh-pages
          cd .gh-pages

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout -B gh-pages FETCH_HEAD
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          mkdir -p ..//.publish-root
          rsync -a --exclude '.git' --exclude '.github' ./ ..//.publish-root/

      - name: Build merged root repository
        shell: bash
        run: |
          set -euxo pipefail

          test -f CNAME
          domain="$(head -n 1 CNAME | tr -d '[:space:]')"
          test -n "${domain}"

          rm -rf .tmp-merged-repo
          mkdir -p .tmp-merged-repo
          ostree --repo=.tmp-merged-repo init --mode=archive-z2

          while IFS= read -r app_repo; do
            if [ ! -f "${app_repo}/config" ] || [ ! -d "${app_repo}/objects" ]; then
              echo "Skipping invalid OSTree repo at ${app_repo}"
              continue
            fi

            ostree --repo=.tmp-merged-repo pull-local "${app_repo}"
          done < <(find apps -mindepth 2 -maxdepth 2 -type d -name repo | sort)

          flatpak build-update-repo --generate-static-deltas --prune .tmp-merged-repo

          # For bootstrap runs with no apps yet, appstream refs may be absent.
          # Enforce appstream only when app refs are present.
          if ostree --repo=.tmp-merged-repo refs | grep -q '^app/'; then
            test -f .tmp-merged-repo/summary
            ostree --repo=.tmp-merged-repo refs | grep -q '^appstream/'
          fi

          mkdir -p .publish-root/repo
          rsync -a --delete .tmp-merged-repo/ .publish-root/repo/

          mkdir -p .publish-root/apps
          : > .publish-root/apps/index.txt
          while IFS= read -r app_dir; do
            app_name="$(basename "${app_dir}")"
            echo "${app_name}" >> .publish-root/apps/index.txt
          done < <(find apps -mindepth 1 -maxdepth 1 -type d | sort)

          cat > .publish-root/chillboio.flatpakrepo <<EOF
          [Flatpak Repo]
          Title=Chillboi Studios Flatpak Repository
          Url=https://${domain}/repo/
          Homepage=https://github.com/Chillboio-Studios/flatpak-ota
          Comment=Official Chillboi Studios Flatpak OTA remote
          Description=Add this remote to browse, install, and auto-update Chillboi Studios Flatpak apps in Discover and Flatpak clients.
          DefaultBranch=stable
          SuggestRemoteName=chillboio
          NoGPGVerify=true
          EOF

      - name: Publish generated metadata to gh-pages
        shell: bash
        run: |
          set -euxo pipefail

          cd .gh-pages
          rsync -a --delete --exclude '.git' ../.publish-root/ ./

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add repo chillboio.flatpakrepo apps/index.txt

          if git diff --cached --quiet; then
            echo "No main remote updates to commit."
            exit 0
          fi

          git commit -m "Update merged Flatpak remote"
          git push origin gh-pages
