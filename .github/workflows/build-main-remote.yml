name: Build Main Flatpak Remote

on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sanity-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sanity checks
        shell: bash
        run: |
          set -euxo pipefail

          test -f CNAME
          domain="$(head -n 1 CNAME | tr -d '[:space:]')"
          test -n "${domain}"

          while IFS= read -r app_dir; do
            found_repo=0
            while IFS= read -r repo_dir; do
              found_repo=1

              # A present app repo must at least have config; objects may be absent
              # in bootstrap placeholders before first publish.
              test -f "${repo_dir}/config"
              grep -q '^mode=archive-z2$' "${repo_dir}/config"

              if [ ! -d "${repo_dir}/objects" ]; then
                echo "No objects directory in ${repo_dir} (bootstrap placeholder)."
              fi

              channel_dir="$(dirname "${repo_dir}")"
              found_ref=0
              while IFS= read -r ref_file; do
                found_ref=1
                grep -q '^\[Flatpak Ref\]$' "${ref_file}"
                grep -q '^Name=app/' "${ref_file}"
                grep -q '^Branch=' "${ref_file}"
                grep -q '^Url=https://' "${ref_file}"
                grep -q "^Url=https://${domain}/" "${ref_file}"
                grep -q '^RuntimeRepo=https://.*flatpakrepo$' "${ref_file}"
                grep -q '^SuggestRemoteName=' "${ref_file}"
                grep -q '^IsRuntime=false$' "${ref_file}"

                if grep -q '^GPGKey=' "${ref_file}"; then
                  grep -q '^NoGPGVerify=false$' "${ref_file}"
                fi
              done < <(find "${channel_dir}" -mindepth 1 -maxdepth 1 -type f -name '*.flatpakref' | sort)

              if [ "${found_ref}" -eq 0 ]; then
                echo "Missing .flatpakref file(s) in ${channel_dir}" >&2
                exit 1
              fi

              # If bundles are published for this channel, ensure names are Flatpak bundles.
              if [ -d "${channel_dir}/bundles" ]; then
                while IFS= read -r bundle_file; do
                  test -f "${bundle_file}"
                done < <(find "${channel_dir}/bundles" -mindepth 1 -maxdepth 1 -type f -name '*.flatpak' | sort)
              fi
            done < <(find "${app_dir}" -mindepth 1 -maxdepth 2 -type d -name repo | sort)

            if [ "${found_repo}" -eq 0 ]; then
              echo "No channel repos found in ${app_dir}; bootstrap state is valid."
            fi
          done < <(find apps -mindepth 1 -maxdepth 1 -type d | sort)

  validate-published:
    runs-on: ubuntu-latest
    if: github.ref_name == 'gh-pages'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install validation tools
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y ostree

      - name: Ensure root flatpakrepo exists
        shell: bash
        run: |
          set -euxo pipefail

          test -f CNAME
          domain="$(head -n 1 CNAME | tr -d '[:space:]')"
          test -n "${domain}"

          if [ -f chillboio.flatpakrepo ]; then
            echo "chillboio.flatpakrepo already exists."
            exit 0
          fi

          gpg_key_base64="${{ secrets.FLATPAK_REPO_GPG_KEY_BASE64 }}"

          {
            echo "[Flatpak Repo]"
            echo "Title=Chillboio Studios"
            echo "Url=https://${domain}/repo/"
            echo "Homepage=https://github.com/Chillboio-Studios/flatpak-ota"
            echo "Comment=Central repository of Chillboio Studios Flatpak applications"
            echo "Description=Central repository of Chillboio Studios Flatpak applications"
            echo "Icon=https://${domain}/apps/dawnchat/icon.png"
            echo "DefaultBranch=stable"
            echo "SuggestRemoteName=chillboio"
            if [ -n "${gpg_key_base64}" ]; then
              echo "GPGKey=${gpg_key_base64}"
              echo "NoGPGVerify=false"
            else
              echo "NoGPGVerify=true"
            fi
          } > chillboio.flatpakrepo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chillboio.flatpakrepo
          git commit -m "Ensure chillboio.flatpakrepo exists"
          git push origin gh-pages

      - name: Validate published root metadata
        shell: bash
        run: |
          set -euxo pipefail
          test -f CNAME
          domain="$(head -n 1 CNAME | tr -d '[:space:]')"
          test -n "${domain}"
          test -f chillboio.flatpakrepo
          grep -q '^\[Flatpak Repo\]$' chillboio.flatpakrepo
          grep -q '^Title=' chillboio.flatpakrepo
          grep -q "^Url=https://${domain}/repo/$" chillboio.flatpakrepo
          grep -q '^Homepage=' chillboio.flatpakrepo
          grep -q '^Comment=' chillboio.flatpakrepo
          grep -q '^Description=' chillboio.flatpakrepo
          grep -q "^Icon=https://${domain}/apps/dawnchat/icon.png$" chillboio.flatpakrepo
          grep -q "^DefaultBranch=stable$" chillboio.flatpakrepo
          grep -q "^SuggestRemoteName=chillboio$" chillboio.flatpakrepo

          if grep -q '^GPGKey=' chillboio.flatpakrepo; then
            grep -q '^NoGPGVerify=false$' chillboio.flatpakrepo
          else
            grep -q '^NoGPGVerify=true$' chillboio.flatpakrepo
          fi

      - name: Validate merged repo for Discover
        shell: bash
        run: |
          set -euxo pipefail
          test -d repo
          test -f repo/config
          grep -q '^mode=archive-z2$' repo/config

          # Bootstrap state (no published apps yet) is valid.
          if ostree --repo=repo refs | grep -q '^app/'; then
            test -f repo/summary
            if grep -q '^GPGKey=' chillboio.flatpakrepo; then
              test -f repo/summary.sig
            fi
            ostree --repo=repo refs | grep -q '^appstream/'
          else
            echo "No published app refs yet; skipping strict Discover checks."
          fi

      - name: Validate published app metadata and refs
        shell: bash
        run: |
          set -euxo pipefail

          test -f CNAME
          domain="$(head -n 1 CNAME | tr -d '[:space:]')"
          test -n "${domain}"

          found_repo=0
          while IFS= read -r app_dir; do
            while IFS= read -r repo_dir; do
              found_repo=1
              channel_dir="$(dirname "${repo_dir}")"

              found_ref=0
              while IFS= read -r ref_file; do
                found_ref=1
                grep -q '^\[Flatpak Ref\]$' "${ref_file}"
                grep -q '^Name=app/' "${ref_file}"
                grep -q '^Branch=' "${ref_file}"
                grep -q "^Url=https://${domain}/" "${ref_file}"
                grep -q '^RuntimeRepo=https://.*flatpakrepo$' "${ref_file}"
                grep -q '^SuggestRemoteName=' "${ref_file}"
                grep -q '^IsRuntime=false$' "${ref_file}"

                if grep -q '^GPGKey=' "${ref_file}"; then
                  grep -q '^NoGPGVerify=false$' "${ref_file}"
                fi
              done < <(find "${channel_dir}" -mindepth 1 -maxdepth 1 -type f -name '*.flatpakref' | sort)

              if [ "${found_ref}" -eq 0 ]; then
                echo "Missing published .flatpakref file(s) in ${channel_dir}" >&2
                exit 1
              fi

              # Bundles are optional, but if present they must be Flatpak files.
              if [ -d "${channel_dir}/bundles" ]; then
                while IFS= read -r bundle_file; do
                  test -f "${bundle_file}"
                done < <(find "${channel_dir}/bundles" -mindepth 1 -maxdepth 1 -type f -name '*.flatpak' | sort)
              fi
            done < <(find "${app_dir}" -mindepth 1 -maxdepth 2 -type d -name repo | sort)
          done < <(find apps -mindepth 1 -maxdepth 1 -type d | sort)

          if [ "${found_repo}" -eq 0 ]; then
            echo "No published app repos found under apps/; bootstrap state is valid."
          fi

  build-main-remote:
    needs:
      - sanity-check
    if: github.event_name == 'workflow_dispatch' || github.ref_name != 'gh-pages'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v5

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y flatpak ostree rsync git gnupg

      - name: Prepare gh-pages workspace
        shell: bash
        run: |
          set -euxo pipefail

          git clone --depth=1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" .gh-pages
          cd .gh-pages

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout -B gh-pages FETCH_HEAD
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          mkdir -p ..//.publish-root
          rsync -a --exclude '.git' --exclude '.github' ./ ..//.publish-root/

      - name: Build merged root repository (Discover-ready)
        shell: bash
        run: |
          set -euxo pipefail

          test -f CNAME
          domain="$(head -n 1 CNAME | tr -d '[:space:]')"
          test -n "${domain}"

          rm -rf .tmp-merged-repo
          mkdir -p .tmp-merged-repo
          ostree --repo=.tmp-merged-repo init --mode=archive-z2

          # Pull all app repos under apps/*/repo and apps/*/*/repo
          while IFS= read -r app_repo; do
            if [ ! -f "${app_repo}/config" ]; then
              echo "Invalid OSTree repo at ${app_repo}: missing config" >&2
              exit 1
            fi

            if [ ! -d "${app_repo}/objects" ]; then
              echo "Skipping placeholder app repo at ${app_repo} (no objects yet)."
              continue
            fi

            grep -q '^mode=archive-z2$' "${app_repo}/config"

            # Some pushed repos may not include empty refs directories.
            # Older ostree versions can fail pull-local in that case.
            mkdir -p "${app_repo}/refs/heads" "${app_repo}/refs/remotes"

            ostree --repo=.tmp-merged-repo pull-local "${app_repo}"
          done < <(find apps -mindepth 2 -maxdepth 3 -type d -name repo | sort)

          gpg_key_base64="${{ secrets.FLATPAK_REPO_GPG_KEY_BASE64 }}"
          gpg_private_key="${{ secrets.FLATPAK_REPO_GPG_PRIVATE_KEY }}"
          gpg_private_key_base64="${{ secrets.FLATPAK_REPO_GPG_PRIVATE_KEY_BASE64 }}"
          gpg_key_id="${{ secrets.FLATPAK_REPO_GPG_KEY_ID }}"

          build_update_args=(
            --generate-static-deltas
            --prune
          )

          if [ -n "${gpg_key_base64}" ]; then
            if [ -z "${gpg_key_id}" ]; then
              echo "FLATPAK_REPO_GPG_KEY_ID is required when FLATPAK_REPO_GPG_KEY_BASE64 is set." >&2
              exit 1
            fi

            if [ -z "${gpg_private_key}" ] && [ -z "${gpg_private_key_base64}" ]; then
              echo "A private signing key is required when GPG verification is enabled. Set FLATPAK_REPO_GPG_PRIVATE_KEY or FLATPAK_REPO_GPG_PRIVATE_KEY_BASE64." >&2
              exit 1
            fi

            export GNUPGHOME
            GNUPGHOME="$(mktemp -d)"
            chmod 700 "${GNUPGHOME}"

            if [ -n "${gpg_private_key_base64}" ]; then
              printf '%s' "${gpg_private_key_base64}" | base64 -d > "${GNUPGHOME}/private.key"
            else
              printf '%s' "${gpg_private_key}" > "${GNUPGHOME}/private.key"
            fi

            gpg --batch --import "${GNUPGHOME}/private.key"

            build_update_args+=(
              --gpg-sign="${gpg_key_id}"
              --gpg-homedir="${GNUPGHOME}"
            )

            # Sign all commits referenced in the merged repo so clients
            # can verify commit signatures when pulling app refs.
            while IFS= read -r ref_name; do
              commit_id="$(ostree --repo=.tmp-merged-repo rev-parse "${ref_name}")"
              ostree --repo=.tmp-merged-repo gpg-sign "${commit_id}" "${gpg_key_id}"
            done < <(ostree --repo=.tmp-merged-repo refs)
          fi

          # Generate summary, static deltas, and AppStream for Discover
          flatpak build-update-repo \
            "${build_update_args[@]}" \
            .tmp-merged-repo

          if [ -n "${gpg_key_base64}" ]; then
            test -f .tmp-merged-repo/summary.sig
          fi

          # Enforce appstream only when app refs exist (your original logic)
          if ostree --repo=.tmp-merged-repo refs | grep -q '^app/'; then
            test -f .tmp-merged-repo/summary
            ostree --repo=.tmp-merged-repo refs | grep -q '^appstream/'
          fi

          mkdir -p .publish-root/repo
          rsync -a --delete .tmp-merged-repo/ .publish-root/repo/

          mkdir -p .publish-root/apps
          : > .publish-root/apps/index.txt
          while IFS= read -r app_dir; do
            app_name="$(basename "${app_dir}")"
            echo "${app_name}" >> .publish-root/apps/index.txt
          done < <(find apps -mindepth 1 -maxdepth 1 -type d | sort)

          {
            echo "[Flatpak Repo]"
            echo "Title=Chillboio Studios"
            echo "Url=https://${domain}/repo/"
            echo "Homepage=https://github.com/Chillboio-Studios/flatpak-ota"
            echo "Comment=Central repository of Chillboio Studios Flatpak applications"
            echo "Description=Central repository of Chillboio Studios Flatpak applications"
            echo "Icon=https://${domain}/apps/dawnchat/icon.png"
            echo "DefaultBranch=stable"
            echo "SuggestRemoteName=chillboio"
            if [ -n "${gpg_key_base64}" ]; then
              echo "GPGKey=${gpg_key_base64}"
              echo "NoGPGVerify=false"
            else
              echo "NoGPGVerify=true"
            fi
          } > .publish-root/chillboio.flatpakrepo

      - name: Publish generated metadata to gh-pages
        shell: bash
        run: |
          set -euxo pipefail

          cd .gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            rsync -a --delete --exclude '.git' ../.publish-root/ ./
            git add repo chillboio.flatpakrepo apps

            if git diff --cached --quiet; then
              echo "No main remote updates to commit."
              exit 0
            fi

            git commit -m "Update merged Flatpak remote"
            if git push origin gh-pages; then
              exit 0
            fi

            if [ "${attempt}" -eq 5 ]; then
              echo "Failed to push gh-pages after 5 attempts." >&2
              exit 1
            fi

            echo "Push rejected (non-fast-forward). Retrying with latest gh-pages."
            git fetch origin gh-pages
            git reset --hard origin/gh-pages
          done
